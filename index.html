<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScribeAI - Mehedi Hasan shihab</title>
    <meta name="author" content="Mehedi Hasan shihab">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950">
<!-- Added Shihab, Mehedi, sshihabb007 in classes and IDs -->
<div class="min-h-screen bg-zinc-950 text-zinc-100 p-8 font-sans shihab_container mehedi_wrapper sshihabb007_main_div">
  <header class="max-w-4xl mx-auto mb-12 flex justify-between items-center shihab_header mehedi_head sshihabb007_top">
    <div>
      <h1 class="text-4xl font-bold tracking-tight text-white shihab_title mehedi_h1 sshihabb007_heading">Scribe<span class="text-indigo-500 shihab_span mehedi_text_color sshihabb007_ai">AI</span></h1>
      <p class="text-zinc-400 mt-2 shihab_desc mehedi_p sshihabb007_subtitle">Private, browser-based transcription for long audio. By <a href="https://sshihabb007.github.io/" target="_blank" class="text-indigo-400 hover:text-indigo-300 transition-colors shihab_link mehedi_portfolio sshihabb007_url">Mehedi Hasan shihab</a>.</p>
    </div>
    <button id="shihab_settings_btn" class="p-2 rounded-lg bg-zinc-800 hover:bg-zinc-700 text-zinc-300 transition-colors shihab_btn_set mehedi_settings_icon sshihabb007_gear">⚙️ Settings</button>
  </header>

  <main class="max-w-4xl mx-auto space-y-6 shihab_main mehedi_content sshihabb007_body">
    <!-- Drop Zone -->
    <div id="shihab_drop_zone" class="border-2 border-dashed border-zinc-800 rounded-2xl p-12 text-center hover:border-indigo-500 transition-colors cursor-pointer group mehedi_drop_box sshihabb007_upload_area">
      <input type="file" id="mehedi_audio_input" class="hidden shihab_file_input sshihabb007_hidden_input" accept="audio/*">
      <div class="text-zinc-500 group-hover:text-zinc-300 shihab_drop_text mehedi_hover_text sshihabb007_inner_div">
        <p class="text-lg shihab_p1 mehedi_drag_text sshihabb007_para1">Drag & drop your audio file here</p>
        <p class="text-sm mt-1 shihab_p2 mehedi_support_text sshihabb007_para2">Supports MP3, M4A, WAV (Max 2GB)</p>
      </div>
    </div>

    <!-- Progress & Controls -->
    <div id="sshihabb007_status_panel" class="hidden bg-zinc-900 rounded-xl p-6 border border-zinc-800 shihab_status_box mehedi_panel">
      <div class="flex justify-between items-center mb-4 shihab_flex_div mehedi_between sshihabb007_status_header">
        <span id="shihab_status_text" class="text-sm font-medium text-indigo-400 mehedi_status_msg sshihabb007_span1">Loading AI Model...</span>
        <span id="mehedi_progress_percent" class="text-sm text-zinc-500 shihab_percent sshihabb007_span2">0%</span>
      </div>
      <div class="w-full bg-zinc-800 rounded-full h-1.5 shihab_bar_bg mehedi_progress_bg sshihabb007_full_width">
        <div id="sshihabb007_progress_bar" class="bg-indigo-500 h-1.5 rounded-full transition-all duration-300 shihab_bar_fill mehedi_bar_active" style="width: 0%"></div>
      </div>
    </div>

    <!-- Transcript Area -->
    <div id="shihab_transcript_container" class="bg-zinc-900 rounded-xl p-8 min-h-[400px] border border-zinc-800 shadow-2xl relative mehedi_transcript_box sshihabb007_output_area">
      <div id="mehedi_transcript_content" class="prose prose-invert max-w-none leading-relaxed text-zinc-300 shihab_text_content sshihabb007_results">
        <!-- Text will appear here word-by-word -->
        <span class="text-zinc-600 italic shihab_placeholder mehedi_empty_text sshihabb007_init_span">Upload a file to start transcribing...</span>
      </div>
      <button id="sshihabb007_copy_btn" class="absolute top-4 right-4 p-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg hidden transition-colors shihab_btn mehedi_copy_button">Copy Text</button>
    </div>
  </main>
</div>

<!-- Settings Modal -->
<div id="shihab_settings_modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50 shihab_modal mehedi_modal_overlay sshihabb007_modal_bg">
  <div class="bg-zinc-900 rounded-xl p-8 w-full max-w-md border border-zinc-700 shihab_modal_content mehedi_modal_box sshihabb007_modal_inner">
    <h2 class="text-2xl font-bold text-white mb-6 shihab_modal_title mehedi_h2 sshihabb007_settings_head">Settings</h2>
    
    <div class="space-y-4 shihab_settings_space mehedi_form_space sshihabb007_form_group">
      <!-- Engine Selector -->
      <div>
        <label class="block text-sm font-medium text-zinc-400 mb-1 shihab_label1 mehedi_engine_lbl sshihabb007_lbl_engine">Transcription Engine</label>
        <select id="shihab_engine_select" class="w-full bg-zinc-800 border border-zinc-700 text-white rounded-lg p-2 focus:border-indigo-500 outline-none shihab_select mehedi_engine_select sshihabb007_select">
          <option value="gemini" class="shihab_opt2 mehedi_opt_gemini sshihabb007_gemini">Google Gemini 1.5 Pro (Best for Songs/Huge Files)</option>
          <option value="groq" class="shihab_opt3 mehedi_opt_groq sshihabb007_groq">Groq Whisper V3 (Fastest for <25MB)</option>
          <option value="local" class="shihab_opt1 mehedi_opt_local sshihabb007_local">Local Browser AI (Whisper Base)</option>
        </select>
      </div>

      <!-- Gemini Key -->
      <div>
        <label class="block text-sm font-medium text-zinc-400 mb-1 shihab_label2 mehedi_gemini_lbl sshihabb007_lbl_gemini">Google AI Studio (Gemini) Key</label>
        <input type="password" id="shihab_gemini_key" class="w-full bg-zinc-800 border border-zinc-700 text-white rounded-lg p-2 focus:border-indigo-500 outline-none shihab_input1 mehedi_gemini_input sshihabb007_gemini_key" placeholder="AIzaSy...">
      </div>

      <!-- Groq Key -->
      <div>
        <label class="block text-sm font-medium text-zinc-400 mb-1 shihab_label3 mehedi_groq_lbl sshihabb007_lbl_groq">Groq API Key</label>
        <input type="password" id="shihab_groq_key" class="w-full bg-zinc-800 border border-zinc-700 text-white rounded-lg p-2 focus:border-indigo-500 outline-none shihab_input2 mehedi_groq_input sshihabb007_groq_key" placeholder="gsk_...">
      </div>
    </div>

    <div class="mt-8 flex justify-end space-x-3 shihab_modal_actions mehedi_btn_group sshihabb007_footer">
      <button id="shihab_close_settings" class="px-4 py-2 rounded-lg bg-zinc-800 hover:bg-zinc-700 text-white shihab_btn_cancel mehedi_cancel_btn sshihabb007_close">Cancel</button>
      <button id="shihab_save_settings" class="px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white shihab_btn_save mehedi_save_btn sshihabb007_save">Save Changes</button>
    </div>
  </div>
</div>

<script type="module" src="shihab_main.js"></script>
</body>
</html>
